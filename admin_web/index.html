<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-SPA — Админ-панель</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #fff;
            --text: #1a1a2e;
            --text2: #666;
            --border: #e2e4e9;
            --accent: #4f6ef7;
            --accent-hover: #3b54d4;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); display: flex; min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px; background: var(--card); border-right: 1px solid var(--border);
            padding: 20px 0; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar .logo { font-size: 18px; font-weight: 700; padding: 0 20px 20px; color: var(--accent); }
        .sidebar nav a {
            display: block; padding: 10px 20px; color: var(--text2); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all .15s; border-left: 3px solid transparent;
        }
        .sidebar nav a:hover { background: var(--bg); color: var(--text); }
        .sidebar nav a.active { color: var(--accent); border-left-color: var(--accent); background: #eef1ff; }

        /* Main */
        .main { flex: 1; padding: 24px 32px; overflow-y: auto; max-height: 100vh; }

        /* Login */
        .login-box {
            width: 360px; margin: 120px auto; background: var(--card); padding: 40px;
            border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-box h1 { text-align: center; margin-bottom: 24px; font-size: 22px; }
        .login-box input {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 15px; margin-bottom: 12px;
        }
        .login-box button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: var(--accent); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .login-box button:hover { background: var(--accent-hover); }
        .login-box .err { color: var(--red); font-size: 13px; margin-bottom: 8px; }

        /* Headers */
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .toolbar input {
            padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
            flex: 1; min-width: 200px;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .15s;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-hover); }
        .btn-outline { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
        .btn-outline:hover { background: #eef1ff; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-green:hover { opacity: 0.85; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:hover { opacity: 0.85; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        /* Table */
        table {
            width: 100%; border-collapse: collapse; background: var(--card);
            border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        th, td { padding: 10px 12px; text-align: left; font-size: 13px; }
        th { background: #f8f9fb; font-weight: 600; color: var(--text2); border-bottom: 2px solid var(--border); }
        td { border-bottom: 1px solid var(--border); }
        tr:hover td { background: #fafbfc; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 600;
        }
        .badge-on { background: #dcfce7; color: #166534; }
        .badge-off { background: #fef3c7; color: #92400e; }

        /* Pagination */
        .pager { display: flex; gap: 8px; align-items: center; margin-top: 16px; font-size: 14px; }
        .pager button { padding: 6px 12px; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .modal {
            background: var(--card); border-radius: 16px; padding: 28px; width: 600px;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }
        .modal h2 { margin-bottom: 16px; font-size: 18px; }
        .modal .field { margin-bottom: 8px; font-size: 14px; }
        .modal .field strong { display: inline-block; width: 140px; color: var(--text2); }
        .modal .section { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
        .modal .section h3 { font-size: 14px; margin-bottom: 8px; color: var(--text2); }
        .modal-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

        /* Stats cards */
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .card-stat {
            background: var(--card); padding: 16px; border-radius: var(--radius);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .card-stat .val { font-size: 28px; font-weight: 700; color: var(--accent); }
        .card-stat .lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }

        /* Settings */
        .setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .setting-row label { width: 180px; font-weight: 500; font-size: 14px; }
        .setting-row input { width: 80px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; text-align: center; }
        .setting-row .pct { color: var(--text2); }

        /* Tabs for sections */
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tabs button {
            padding: 8px 20px; border: none; background: var(--card); color: var(--text2);
            font-size: 14px; font-weight: 500; cursor: pointer;
            border-radius: var(--radius) var(--radius) 0 0;
            border: 1px solid var(--border); border-bottom: none;
        }
        .tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .hidden { display: none !important; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px;
            font-size: 14px; font-weight: 500; z-index: 9999; animation: slideIn .3s;
        }
        .toast-ok { background: #dcfce7; color: #166534; }
        .toast-err { background: #fee2e2; color: #991b1b; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        pre.csv { background: #f8f9fb; padding: 16px; border-radius: 8px; font-size: 12px; max-height: 400px; overflow: auto; }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-page">
    <div class="login-box">
        <h1>CH-SPA Admin</h1>
        <div id="login-err" class="err"></div>
        <input type="password" id="login-pass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">Войти</button>
    </div>
</div>

<!-- App -->
<div id="app" class="hidden" style="display:flex;width:100%;">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="logo">CH-SPA</div>
    <nav>
        <a href="#" data-page="users" class="active" onclick="switchPage('users')">Пользователи</a>
        <a href="#" data-page="stats" onclick="switchPage('stats')">Статистика</a>
        <a href="#" data-page="ref" onclick="switchPage('ref')">Реферальный %</a>
        <a href="#" data-page="export" onclick="switchPage('export')">Экспорт CSV</a>
    </nav>
</aside>

<!-- Main content -->
<main class="main" id="main-content"></main>

</div>

<!-- User Detail Modal -->
<div id="user-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="user-modal-content"></div>
</div>

<div id="toast-container"></div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('admin_token');

// ── Auth ────────────────────────────────────────────────
async function doLogin() {
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-err');
    errEl.textContent = '';
    try {
        const r = await fetch(API + '/auth/login', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: pass})
        });
        if (!r.ok) throw new Error('Неверный пароль');
        const data = await r.json();
        token = data.token;
        localStorage.setItem('admin_token', token);
        showApp();
    } catch(e) {
        errEl.textContent = e.message;
    }
}

async function api(method, path, body=null) {
    const opts = { method, headers: {'Authorization': 'Bearer ' + token} };
    if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
    }
    const r = await fetch(API + path, opts);
    if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
    if (!r.ok) {
        const err = await r.json().catch(() => ({detail: r.statusText}));
        throw new Error(err.detail || 'Request failed');
    }
    return r.json();
}

function logout() {
    localStorage.removeItem('admin_token');
    token = null;
    document.getElementById('login-page').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}

function showApp() {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('app').style.display = 'flex';
    switchPage('users');
}

// ── Navigation ──────────────────────────────────────────
let currentPage = 'users';

function switchPage(page) {
    currentPage = page;
    document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`).classList.add('active');
    if (page === 'users') loadUsers();
    else if (page === 'stats') loadStats();
    else if (page === 'ref') loadRefSettings();
    else if (page === 'export') loadExport();
}

// ── Toast ───────────────────────────────────────────────
function toast(msg, type='ok') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

// ── Users Page ──────────────────────────────────────────
let usersPage = 0, usersSearch = '';

async function loadUsers() {
    try {
        const data = await api('GET', `/users?page=${usersPage}&per_page=15&search=${encodeURIComponent(usersSearch)}`);
        renderUsers(data);
    } catch(e) { toast(e.message, 'err'); }
}

function renderUsers(data) {
    const html = `
        <div class="page-title">Пользователи (${data.total})</div>
        <div class="toolbar">
            <input type="text" placeholder="Поиск по имени, телефону, ID, реф.коду..." value="${esc(usersSearch)}"
                   oninput="usersSearch=this.value; usersPage=0; loadUsers()">
            <button class="btn btn-accent" onclick="usersPage=0; loadUsers()">Найти</button>
        </div>
        <table>
            <thead><tr>
                <th>ID</th><th>Имя</th><th>Телефон</th><th>Реф. код</th><th>Покупок</th><th>Статус</th><th>Бонусы</th><th></th>
            </tr></thead>
            <tbody>
                ${data.users.map(u => `
                <tr>
                    <td>${u.telegram_id}</td>
                    <td>${esc(u.first_name || '—')} ${esc(u.last_name || '')}</td>
                    <td>${esc(u.phone || '—')}</td>
                    <td>${esc(u.ref_code || '—')}</td>
                    <td>${u.purchase_count}</td>
                    <td>${stateBadge(u.user_state)}</td>
                    <td>${bonusBadges(u.granted_bonuses)}</td>
                    <td><button class="btn btn-outline btn-sm" onclick="openUser(${u.telegram_id})">Открыть</button></td>
                </tr>`).join('')}
            </tbody>
        </table>
        <div class="pager">
            <button class="btn btn-outline btn-sm" ${data.page <= 0 ? 'disabled' : ''} onclick="usersPage=${data.page-1};loadUsers()">Назад</button>
            <span>Стр. ${data.page+1} из ${data.total_pages}</span>
            <button class="btn btn-outline btn-sm" ${data.page >= data.total_pages-1 ? 'disabled' : ''} onclick="usersPage=${data.page+1};loadUsers()">Вперед</button>
        </div>`;
    document.getElementById('main-content').innerHTML = html;
}

function stateBadge(s) {
    const map = {
        'new': ['badge-off', 'новый'],
        'awaiting_subscription': ['badge-off', 'подписка'],
        'awaiting_contact': ['badge-off', 'контакт'],
        'awaiting_receipt': ['badge-off', 'чек'],
        'asking_more_receipts': ['badge-off', 'ещё чеки?'],
        'choosing_bonus': ['badge-on', 'выбор бонуса'],
    };
    const [cls, label] = map[s] || ['badge-off', s];
    return `<span class="badge ${cls}">${label}</span>`;
}

function bonusBadges(granted) {
    if (!granted || granted.length === 0) return '<span class="badge badge-off">—</span>';
    const names = {'bonus_1':'B1','bonus_2':'B2','bonus_3':'B3'};
    return granted.map(b => `<span class="badge badge-on">${names[b]||b}</span>`).join(' ');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── User Detail Modal ───────────────────────────────────
async function openUser(tid) {
    try {
        const u = await api('GET', `/users/${tid}`);
        renderUserModal(u);
    } catch(e) { toast(e.message, 'err'); }
}

function renderUserModal(u) {
    const granted = u.granted_bonuses || [];
    const hasB1 = granted.includes('bonus_1');
    const hasB2 = granted.includes('bonus_2');
    const hasB3 = granted.includes('bonus_3');

    let html = `
        <h2>${esc(u.first_name||'—')} ${esc(u.last_name||'')} <small style="color:#888">#${u.telegram_id}</small></h2>
        <div class="field"><strong>Username:</strong> @${esc(u.username||'—')}</div>
        <div class="field"><strong>Телефон:</strong> ${esc(u.phone||'—')}</div>
        <div class="field"><strong>Статус:</strong> ${stateBadge(u.user_state)}</div>
        <div class="field"><strong>Реф. код:</strong> ${esc(u.ref_code||'—')}</div>
        <div class="field"><strong>Создан:</strong> ${u.created_at||'—'}</div>

        <div class="section"><h3>Бонусы</h3>
            <div class="field"><strong>Выданы:</strong> ${granted.length ? granted.map(b => {
                const names = {'bonus_1':'Бонус 1','bonus_2':'Бонус 2','bonus_3':'Бонус 3'};
                return names[b]||b;
            }).join(', ') : '—'}</div>
            <div class="modal-actions">
                <button class="btn btn-green btn-sm" onclick="grantBonus(${u.telegram_id}, 'bonus_1')">Бонус 1</button>
                <button class="btn btn-green btn-sm" onclick="grantBonus(${u.telegram_id}, 'bonus_2')">Бонус 2</button>
                <button class="btn btn-green btn-sm" onclick="grantBonus(${u.telegram_id}, 'bonus_3')">Бонус 3</button>
                <button class="btn btn-accent btn-sm" onclick="grantBonus(${u.telegram_id}, 'ALL')">Открыть ВСЕ</button>
                <button class="btn btn-red btn-sm" onclick="revokeBonus(${u.telegram_id}, 'ALL')">Закрыть ВСЕ</button>
            </div>
        </div>

        <div class="section"><h3>Покупки</h3>
            <div class="field"><strong>Всего:</strong> ${u.total_purchases} шт.</div>
            <div class="field"><strong>Не сожжено:</strong> ${u.unburned_purchases} шт.</div>
            ${u.purchases.length ? `
            <table style="margin-top:8px"><thead><tr><th>Товар</th><th>Кол-во</th><th>Сожжён</th></tr></thead>
            <tbody>${u.purchases.slice(0,10).map(p => `
                <tr><td>${esc(p.product_name)}</td><td>${p.quantity}</td><td>${p.is_burned ? 'Да' : '—'}</td></tr>
            `).join('')}</tbody></table>` : '<div style="color:#888;font-size:13px;margin-top:4px">Нет покупок</div>'}
        </div>

        <div class="section"><h3>Чеки</h3>
            <div class="field"><strong>Всего:</strong> ${u.total_receipts}</div>
            <div class="field"><strong>Сожжено:</strong> ${u.used_receipts}</div>
            ${u.receipts.length ? `
            <table style="margin-top:8px"><thead><tr><th>Номер</th><th>Сожжён</th><th>Дата</th></tr></thead>
            <tbody>${u.receipts.slice(0,10).map(r => `
                <tr><td>${esc(r.receipt_number)}</td><td>${r.is_used ? 'Да' : '—'}</td><td>${r.created_at||''}</td></tr>
            `).join('')}</tbody></table>` : '<div style="color:#888;font-size:13px;margin-top:4px">Нет чеков</div>'}
        </div>

        <div class="section"><h3>Реферальная цепочка</h3>
            <div class="field"><strong>L1 (пригласил):</strong> ${u.referrer ? esc(u.referrer.first_name||'') + ' (#'+u.referrer.telegram_id+')' : '—'}</div>
            <div class="field"><strong>L2:</strong> ${u.referrer_l2 ? esc(u.referrer_l2.first_name||'') + ' (#'+u.referrer_l2.telegram_id+')' : '—'}</div>
            <div class="field"><strong>L3:</strong> ${u.referrer_l3 ? esc(u.referrer_l3.first_name||'') + ' (#'+u.referrer_l3.telegram_id+')' : '—'}</div>
        </div>

        <div class="modal-actions" style="border-top:1px solid var(--border);padding-top:12px">
            <button class="btn btn-outline" onclick="closeModal()">Закрыть</button>
        </div>`;

    document.getElementById('user-modal-content').innerHTML = html;
    document.getElementById('user-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('user-modal').classList.add('hidden');
}

async function grantBonus(tid, bonusKey) {
    try {
        const r = await api('POST', `/users/${tid}/grant`, {bonus_key: bonusKey});
        toast(bonusKey === 'ALL' ? 'Все бонусы открыты' : `${bonusKey} открыт`);
        openUser(tid); // refresh modal
    } catch(e) { toast(e.message, 'err'); }
}

async function revokeBonus(tid, bonusKey) {
    if (!confirm(bonusKey === 'ALL' ? 'Закрыть ВСЕ бонусы?' : `Закрыть ${bonusKey}?`)) return;
    try {
        const r = await api('POST', `/users/${tid}/revoke`, {bonus_key: bonusKey});
        toast(bonusKey === 'ALL' ? 'Все бонусы закрыты' : `${bonusKey} закрыт`);
        openUser(tid);
    } catch(e) { toast(e.message, 'err'); }
}

// ── Stats ───────────────────────────────────────────────
async function loadStats() {
    try {
        const data = await api('GET', '/stats');
        renderStats(data);
    } catch(e) { toast(e.message, 'err'); }
}

function renderStats(data) {
    const fieldNames = {
        'starts':'Стартов', 'contacts':'Контактов', 'packages':'Выбрано пакетов',
        'submissions':'Заявок', 'approved':'Одобрено', 'bonus_clicks':'Кликов по бонусам',
        'reviews':'Отзывов', 'payments':'Платежей', 'active_users':'Активных'
    };
    let html = '<div class="page-title">Статистика</div>';

    for (const [period, periodName] of [['today','Сегодня'],['week','За 7 дней']]) {
        html += `<h3 style="margin:16px 0 10px">${periodName}</h3><div class="cards">`;
        const s = data[period] || {};
        for (const [key, val] of Object.entries(s)) {
            html += `<div class="card-stat"><div class="val">${val}</div><div class="lbl">${fieldNames[key]||key}</div></div>`;
        }
        html += '</div>';
    }
    document.getElementById('main-content').innerHTML = html;
}

// ── Ref Settings ────────────────────────────────────────
async function loadRefSettings() {
    try {
        const data = await api('GET', '/ref-settings');
        renderRefSettings(data);
    } catch(e) { toast(e.message, 'err'); }
}

function renderRefSettings(data) {
    let html = `
        <div class="page-title">Реферальные комиссии</div>
        <div class="setting-row">
            <label>Уровень 1 (прямой):</label>
            <input type="number" id="ref-l1" value="${data.l1}" min="0" max="100"> <span class="pct">%</span>
        </div>
        <div class="setting-row">
            <label>Уровень 2:</label>
            <input type="number" id="ref-l2" value="${data.l2}" min="0" max="100"> <span class="pct">%</span>
        </div>
        <div class="setting-row">
            <label>Уровень 3:</label>
            <input type="number" id="ref-l3" value="${data.l3}" min="0" max="100"> <span class="pct">%</span>
        </div>
        <button class="btn btn-accent" onclick="saveRefSettings()">Сохранить</button>
    `;
    document.getElementById('main-content').innerHTML = html;
}

async function saveRefSettings() {
    const l1 = parseInt(document.getElementById('ref-l1').value);
    const l2 = parseInt(document.getElementById('ref-l2').value);
    const l3 = parseInt(document.getElementById('ref-l3').value);
    try {
        await api('PUT', '/ref-settings', {l1, l2, l3});
        toast('Настройки сохранены');
    } catch(e) { toast(e.message, 'err'); }
}

// ── Export ──────────────────────────────────────────────
async function loadExport() {
    try {
        const data = await api('GET', '/export');
        renderExport(data);
    } catch(e) { toast(e.message, 'err'); }
}

function renderExport(data) {
    let html = `
        <div class="page-title">Экспорт CSV (${data.total} пользователей)</div>
        <button class="btn btn-accent" style="margin-bottom:12px" onclick="downloadCSV()">Скачать CSV</button>
        <pre class="csv" id="csv-data">${esc(data.csv)}</pre>
    `;
    document.getElementById('main-content').innerHTML = html;
}

function downloadCSV() {
    const csv = document.getElementById('csv-data').textContent;
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'users_export.csv'; a.click();
    URL.revokeObjectURL(url);
}

// ── Init ────────────────────────────────────────────────
if (token) {
    api('GET', '/auth/check')
        .then(() => showApp())
        .catch(() => { token = null; localStorage.removeItem('admin_token'); });
}
</script>
